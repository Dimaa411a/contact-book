<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <link rel="stylesheet"  href="styles.css">
</head>
<body>

    <main>
    <aside>
        <header class="contacts-header">
            <div class="contacts-info">
                <h2>Contacts</h2>
                <span>12 saved</span>
            </div>

            <button class="add-btn">+ Add contact</button>

            <label class="visually-hidden" for="search">Search contacts</label>
            <input id="search" type="search" placeholder="Search name, phone, or email">
        </header>

        <section class="contact-group">
            <ul class="contact-list">

            </ul>
        </section>

    </aside>

        <section class="contact-details">
            <header>
                <div class="profile">
                    <div class="avatar-mn" style="">MN</div>
                    <div class="user-info">
                        <h1>Maria Novak</h1>
                        <span>Added Mar 14. avatar:initials fallback</span>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>

                <div class="input-fields">
                    <div class="field">
                        <span class="label">PHONE</span>
                        <span class="phone-field">+1 (312) 555-0146</span>
                    </div>

                    <div class="field">
                        <span class="label">EMAIL</span>
                        <span class="email-field">maria.novak@fastmail.com</span>
                    </div>

                    <div class="field">
                        <span class="label">NOTE</span>
                        <span class="note-field">
            Study group partner — prefers texts over calls. Met at the Week 3 workshop.
              </span>
                    </div>
                </div>
            </header>
        </section>
    </main>

</body>
</html>
